<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="googlec9d4b6151ccdba54.html" />
    <title>Shopping Cart - Chadha Canvas</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <h1>🌾 Chadha Canvas</h1>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#products">Products</a></li>
                <li><a href="cart.html" class="active">🛒 Cart</a></li>
            </ul>
        </div>
    </nav>

    <!-- Cart Section -->
    <section class="cart-section">
        <div class="container">
            <h2>Shopping Cart</h2>
            <div class="cart-content">
                <table class="cart-table" id="cart-table">
                    <thead>
                        <tr>
                            <th>Product</th>
                            <th>Price</th>
                            <th>Quantity</th>
                            <th>Total</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="cart-items">
                        <!-- Cart items loaded from localStorage -->
                    </tbody>
                </table>
                <div id="empty-cart" class="empty-message">
                    <p>Your cart is empty. <a href="index.html#products">Continue Shopping</a></p>
                </div>
            </div>

            <!-- Cart Summary -->
            <div class="cart-summary" id="cart-summary">
                <div class="summary-item">
                    <span>Subtotal:</span>
                    <span id="subtotal">₹0</span>
                </div>
                <div class="summary-item">
                    <span>Shipping:</span>
                    <span id="shipping">₹0</span>
                </div>
                <div class="summary-item total">
                    <span>Total:</span>
                    <span id="total">₹0</span>
                </div>
                <button class="btn btn-primary btn-large" onclick="proceedToCheckout()">Proceed to Checkout</button>
                <a href="index.html#products" class="btn btn-secondary">Continue Shopping</a>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 Chadha Canvas. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/cart.js"></script>
</body>
</html>
